<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con Celeste</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 700px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chat-header {
            background: #5f4b8b;
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .chat-header h2 {
            margin: 0;
            font-size: 1.8em;
            letter-spacing: 1px;
        }
        .chat-header p {
            margin: 5px 0 0;
            font-size: 0.9em;
            opacity: 0.9;
        }
        .clear-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8em;
            transition: background 0.3s;
        }
        .clear-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            display: flex;
            max-width: 80%;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-message {
            align-self: flex-end;
        }
        .assistant-message {
            align-self: flex-start;
        }
        .message-content {
            padding: 12px 18px;
            border-radius: 20px;
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .user-message .message-content {
            background: #007bff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant-message .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .timestamp {
            font-size: 0.65em;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }
        .user-message .timestamp {
            color: rgba(255,255,255,0.8);
        }
        .assistant-message .timestamp {
            color: #999;
        }
        .chat-input-container {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 20px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .chat-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            outline: none;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        .chat-input:focus {
            border-color: #5f4b8b;
        }
        .send-btn {
            background: #5f4b8b;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .send-btn:hover {
            background: #4a3a6e;
        }
        .send-btn:active {
            transform: scale(0.95);
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: #f0f0f0;
            border-top: 1px solid #ddd;
            font-size: 0.85em;
            color: #666;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .user-id-badge {
            background: #ddd;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>💬 Celeste</h2>
            <p>Tu asistente personal con memoria persistente</p>
            <button class="clear-btn" onclick="clearHistory()">🗑️ Nueva conversación</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="status-bar">
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span id="status">Conectado</span>
            </div>
            <div class="user-id-badge" id="userIdDisplay"></div>
        </div>
        <div class="chat-input-container">
            <div class="input-group">
                <input type="text" class="chat-input" id="userInput" placeholder="Escribe tu mensaje..." autofocus>
                <button class="send-btn" onclick="sendMessage()">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000';

        // Obtener o crear USER_ID persistente
        let USER_ID = localStorage.getItem('celeste_user_id');
        if (!USER_ID) {
            USER_ID = 'user_' + Math.random().toString(36).substring(2, 15);
            localStorage.setItem('celeste_user_id', USER_ID);
        }
        document.getElementById('userIdDisplay').textContent = 'ID: ' + USER_ID.substring(0, 8) + '...';

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const statusSpan = document.getElementById('status');

        // Cargar historial al iniciar
        loadHistory();

        async function loadHistory() {
            try {
                const response = await fetch(`${API_URL}/history/${USER_ID}?limit=50`);
                if (!response.ok) throw new Error('Error al cargar historial');
                const data = await response.json();
                
                // Mostrar mensajes en orden cronológico
                if (data.history && data.history.length > 0) {
                    // El historial viene de más reciente a más antiguo? Lo ordenamos por timestamp ascendente
                    const sorted = data.history.sort((a, b) => a.timestamp - b.timestamp);
                    for (const msg of sorted) {
                        addMessage(msg.content, msg.role, msg.timestamp);
                    }
                } else {
                    // Si no hay historial, mostrar mensaje de bienvenida
                    addMessage('¡Hola! Soy Celeste, tu asistente personal con memoria persistente. ¿En qué puedo ayudarte?', 'assistant', Date.now() / 1000);
                }
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } catch (error) {
                console.error('Error cargando historial:', error);
                addMessage('No se pudo cargar el historial. Verifica la conexión.', 'assistant', Date.now() / 1000);
            }
        }

        function addMessage(content, role, timestamp = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}-message`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            const timestampDiv = document.createElement('div');
            timestampDiv.className = 'timestamp';
            if (timestamp) {
                const date = new Date(timestamp * 1000);
                timestampDiv.textContent = date.toLocaleTimeString();
            } else {
                timestampDiv.textContent = new Date().toLocaleTimeString();
            }
            
            contentDiv.appendChild(timestampDiv);
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            
            // Auto scroll
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Mostrar mensaje del usuario inmediatamente
            addMessage(message, 'user');
            userInput.value = '';
            
            // Actualizar estado
            statusSpan.textContent = 'Escribiendo...';
            statusSpan.parentElement.querySelector('.status-dot').style.background = '#ff9800';

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        content: message
                    })
                });

                if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);

                const data = await response.json();
                // Mostrar respuesta de Celeste
                addMessage(data.response, 'assistant', data.timestamp);
                
                statusSpan.textContent = 'Conectado';
                statusSpan.parentElement.querySelector('.status-dot').style.background = '#4caf50';
            } catch (error) {
                console.error('Error:', error);
                addMessage('Lo siento, hubo un error al comunicarme con el servidor.', 'assistant');
                statusSpan.textContent = 'Error de conexión';
                statusSpan.parentElement.querySelector('.status-dot').style.background = '#f44336';
            }
        }

        // Permitir enviar con Enter
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Función para borrar historial local (solo en el navegador, no en Supabase)
        function clearHistory() {
            if (confirm('¿Estás seguro de que quieres borrar el historial de esta conversación? (Solo se borrará localmente, los mensajes en la nube permanecen)')) {
                chatMessages.innerHTML = '';
                // Generar nuevo ID de usuario (opcional, para empezar de cero)
                // localStorage.removeItem('celeste_user_id');
                // window.location.reload();
                // O simplemente limpiamos los mensajes y dejamos el mismo ID
                addMessage('¡Hola! Soy Celeste, tu asistente personal con memoria persistente. ¿En qué puedo ayudarte?', 'assistant', Date.now() / 1000);
            }
        }
    </script>
</body>
</html>
